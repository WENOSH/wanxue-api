services:
  - type: web
    name: wanxue-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WANXUE_API_KEY
        sync: false
      - key: WANXUE_LLM_BASE_URL
        sync: false
      - key: WANXUE_LLM_MODEL
        value: deepseek-chat
      - key: WANXUE_LLM_PROVIDER
        value: deepseek
